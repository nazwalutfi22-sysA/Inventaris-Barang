<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Inventaris Barang</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
    }
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #243caa;
      color: white;
      position: fixed;
      padding: 20px;
    }
    .sidebar h4 {
      font-weight: bold;
    }
    .sidebar .menu {
      margin-top: 20px;
    }
    .sidebar .menu a {
      display: block;
      padding: 10px;
      background: #3b82f6;
      border-radius: 20px;
      text-decoration: none;
      color: white;
      margin-bottom: 20px;
      text-align: center;
    }
    .main {
      margin-left: 240px;
      padding: 20px;
    }
    .header-box {
      background: #2dd4bf;
      border-radius: 30px;
      text-align: center;
      padding: 15px;
      font-size: 32px;
      font-weight: bold;
      width: 350px;
      margin-bottom: 20px;
    }
    .btn-add {
      background: #3b82f6;
      color: white;
      border-radius: 10px;
    }
    .table thead {
      background: #e5e7eb;
    }
    .badge-masuk {
      background: green;
    }
    .badge-keluar {
      background: red;
    }
    .btn-edit {
      background: gold;
    }
    .btn-hapus {
      background: red;
      color: white;
    }
    .user {
      position: absolute;
      bottom: 20px;
      left: 20px;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h4>
    <!-- SVG Icon -->
    <svg width="30" height="30" fill="white" viewBox="0 0 24 24">
      <path d="M3 3h18v18H3z"/>
    </svg>
    Inventaris Barang
  </h4>

  <div class="menu">
    <a href="/data_laporan_petugas">Dashboard</a>
  </div>

  <div class="user">
    <svg width="40" height="40" fill="white" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 22c0-4 4-6 8-6s8 2 8 6"/>
    </svg>
    <div>Petugas</div>
  </div>
</div>

        {% block content %}
        <!-- isi halaman -->
        {% endblock %}


</body>
</html>
