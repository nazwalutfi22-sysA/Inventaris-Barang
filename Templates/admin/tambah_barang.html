{% extends 'admin/base.html' %}

{% block title %}Tambah Barang{% endblock %}

{% block content %}

<div class="content-data_barang">
  <div class="card">
    <h1>Tambah Barang</h1>
    <p class="subtitle">Isi Data Barang</p>

    <form>
      <label>Nama Barang</label>
      <input type="text">

      <label>Kategori</label>
      <input type="text">

      <label>Lokasi</label>
      <input type="text">

      <label>Kondisi</label>
      <input type="text">

      <div class="actions">
        <button type="button" class="btn">Batal</button>
        <button type="submit" class="btn btn-primary">Simpan</button>
      </div>
    </form>
  </div>
</div>

{% endblock%}
